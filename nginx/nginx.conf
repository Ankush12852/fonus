# ============================================================
# FONUS — Production Nginx Configuration
# This file tells Nginx how to handle web traffic for the
# Fonus platform. Think of Nginx as the "traffic cop" that
# sits in front of your app and routes requests correctly.
#
# How it works:
#   Browser → Nginx (port 80/443)
#              ├─ /        → Next.js frontend (port 3000)
#              └─ /api/*   → FastAPI backend (port 8000)
# ============================================================

# ── Rate Limiting Zone ──────────────────────────────────────
# Creates a shared memory zone called "api_limit".
# Each unique IP address gets its own counter.
# 10m = 10 megabytes of memory (holds ~160,000 IPs).
# rate=30r/s = max 30 requests per second per IP.
# This prevents bots from hammering your /api/ endpoints.
# ────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── Gzip Compression ────────────────────────────────────────
# Compresses responses before sending to the browser.
# Makes pages load faster — like zipping a file before email.
# ────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_min_length 1024;       # Only compress files bigger than 1KB
gzip_proxied expired no-cache no-store private auth;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
gzip_comp_level 6;          # Compression level 1-9 (6 is a good balance)

# ── Hide Nginx Version ───────────────────────────────────────
# By default Nginx tells attackers which version it's running.
# "server_tokens off" hides this info for security.
# ────────────────────────────────────────────────────────────
server_tokens off;


# ============================================================
# SERVER BLOCK 1: HTTP (port 80) → Redirect to HTTPS (port 443)
# All HTTP requests get instantly redirected to secure HTTPS.
# This is mandatory for production — never serve over plain HTTP.
# ============================================================
server {
    listen 80;
    listen [::]:80;               # Also listen on IPv6

    # Replace "yourdomain.com" with your actual domain.
    # This is set via environment variable in docker-compose.
    server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

    # Redirect ALL http traffic to https permanently (301)
    return 301 https://$host$request_uri;
}


# ============================================================
# SERVER BLOCK 2: HTTPS (port 443) — Main Production Server
# This is where all actual traffic gets handled.
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

    # ── SSL Certificate Paths ───────────────────────────────
    # These certificates are obtained free from Let's Encrypt
    # using the setup-ssl.sh script. They prove your site is
    # genuine and enable the padlock icon in the browser.
    # ────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── SSL Hardening ────────────────────────────────────────
    # Only allow modern, secure encryption protocols.
    # TLSv1.2 and TLSv1.3 are the gold standard.
    # Older TLS 1.0 and 1.1 are vulnerable — block them.
    # ────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS: Tells browsers "always use HTTPS for this site"
    # max-age=31536000 = 1 year. Remove if testing first!
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Security Headers ─────────────────────────────────────
    # These headers protect users from common web attacks.
    # Think of them as safety rules your browser must follow.
    # ────────────────────────────────────────────────────────

    # X-Frame-Options: Prevents your site from being embedded
    # in a hidden iframe (clickjacking attack).
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-XSS-Protection: Enables browser's built-in XSS filter.
    # Cross-Site Scripting (XSS) is a common attack type.
    add_header X-XSS-Protection "1; mode=block" always;

    # X-Content-Type-Options: Stops browsers from guessing the
    # file type — prevents MIME-type sniffing attacks.
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer-Policy: Controls how much info is sent when
    # users click a link to another site.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy: Whitelist of sources allowed to
    # load scripts, styles, images, etc. on your site.
    # 'self' = only from your own domain.
    # Adjust if you add third-party scripts (Google Analytics, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.groq.com;" always;

    # ── Request Size Limit ───────────────────────────────────
    # Limits how large a single upload/request body can be.
    # 10MB is generous for an exam platform (no file uploads needed).
    # ────────────────────────────────────────────────────────
    client_max_body_size 10M;


    # ============================================================
    # LOCATION BLOCK 1: /api/* → FastAPI Backend (port 8000)
    # All requests starting with /api/ go to the Python backend.
    # Example: https://fonus.com/api/chat → FastAPI
    # ============================================================
    location /api/ {
        # Apply rate limiting defined at the top.
        # burst=50 means brief spikes up to 50 requests are OK.
        # nodelay = don't queue them, just reject excess immediately.
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;   # HTTP 429 = "Too Many Requests"

        # Forward the request to FastAPI running on port 8000.
        # "backend" refers to the Docker container name.
        proxy_pass http://backend:8000;

        # These headers tell FastAPI the real client info
        # (since Nginx sits between the client and FastAPI).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings — how long to wait for FastAPI to respond.
        # 60s is generous; AI responses can be slow.
        proxy_read_timeout   60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout   60s;

        # Disable buffering for streaming responses (SSE / chat streaming).
        proxy_buffering off;
    }


    # ============================================================
    # LOCATION BLOCK 2: /health → FastAPI health check
    # Nginx (and Docker) can ping this to check if the API is alive.
    # Returns {"status": "ok"} if the backend is running.
    # ============================================================
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;   # Don't clutter logs with health pings
    }


    # ============================================================
    # LOCATION BLOCK 3: Static files caching
    # Browser files like JS, CSS, images rarely change.
    # Cache them for 30 days so users don't re-download every visit.
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache for 30 days. "immutable" tells browser: don't even
        # check if it changed (content-hashed filenames handle this).
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }


    # ============================================================
    # LOCATION BLOCK 4: / → Next.js Frontend (port 3000)
    # Everything not matching /api/ or static files goes to Next.js.
    # ============================================================
    location / {
        # "frontend" refers to the Docker container name.
        proxy_pass http://frontend:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Next.js hot-module-reloading (dev mode WebSocket).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
