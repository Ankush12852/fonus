# ============================================================
# FONUS — Local Development Nginx Configuration
# 
# This is a SIMPLIFIED version for running on your local
# machine or for testing on a server WITHOUT an SSL certificate.
#
# Differences from production nginx.conf:
#   ✗ No HTTPS / SSL certificates required
#   ✗ No HSTS header (browser would get stuck in HTTPS loop)
#   ✓ Still proxies /api/* to FastAPI
#   ✓ Still proxies / to Next.js
#   ✓ Security headers still included (good practice)
#   ✓ Gzip compression still enabled
#
# How to use locally:
#   docker-compose -f docker-compose.yml up
# Then visit: http://localhost (port 80)
# ============================================================

# Hide Nginx version from error pages and headers
server_tokens off;

# Gzip compression — makes responses smaller and faster
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml;
gzip_comp_level 6;


# ============================================================
# SINGLE SERVER BLOCK: HTTP only (port 80)
# No redirect, no SSL — just plain HTTP for local testing.
# ============================================================
server {
    listen 80;
    listen [::]:80;

    # "localhost" for local machine, or your server IP during testing
    server_name localhost 127.0.0.1;

    # Max upload size (10MB is more than enough for this app)
    client_max_body_size 10M;

    # ── Security Headers ─────────────────────────────────────
    # Even in dev/testing, good to have these active so you
    # can verify they work before going to production.
    # ────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-XSS-Protection       "1; mode=block"                 always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;


    # ============================================================
    # /api/* → FastAPI Backend (port 8000)
    # All API calls (login, chat, questions) go to Python backend.
    # ============================================================
    location /api/ {
        # "backend" = Docker container name for FastAPI.
        # If running without Docker, change to: http://127.0.0.1:8000
        proxy_pass http://backend:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout   60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout   60s;

        # Required for streaming (AI chat responses)
        proxy_buffering off;
    }


    # ============================================================
    # /health → Backend health check
    # Quick way to verify the API is running.
    # Visit http://localhost/health → should return {"status":"ok"}
    # ============================================================
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
    }


    # ============================================================
    # / → Next.js Frontend (port 3000)
    # Everything else goes to the Next.js app.
    # ============================================================
    location / {
        # "frontend" = Docker container name for Next.js.
        # If running without Docker, change to: http://127.0.0.1:3000
        proxy_pass http://frontend:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Next.js hot-reload WebSocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
